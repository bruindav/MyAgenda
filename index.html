  const GCAL_CLIENT_ID = "725684817436-7addcplas6eqfgs88brcajkobra4of4i.apps.googleusercontent.com";

  // ── Event type definitie ────────────────────

    afspraak:   { label: "Afspraak",         icon: "📅", color: null  },   // kleur van agenda
    verjaardag: { label: "Verjaardag",        icon: "🎂", color: "#e91e63" },
    vakantie:   { label: "Vakantie",          icon: "🏖️", color: "#ff9800" },

  };

  // ── State ────────────────────────────────────
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUser   = null;
  let events        = [];
  let gcalEvents    = [];       // events uit Google Agenda (read-only)
  let calendars     = [];
  let today         = new Date();
  let viewDate      = new Date();
  let currentView   = "month";
  let unsubEvents   = null;
  let unsubCals     = null;
  let editingEvent  = null;
  let gcalToken     = null;     // toegangstoken Google Calendar

  const WEEKDAYS_SHORT = ["zo","ma","di","wo","do","vr","za"];
  const WEEKDAYS_LONG  = ["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"];
  const MONTHS         = ["Januari","Februari","Maart","April","Mei","Juni",
                           "Juli","Augustus","September","Oktober","November","December"];

  // ── DOM helpers ──────────────────────────────
  const $  = id => document.getElementById(id);
  const el = (tag, cls, html) => {
    const e = document.createElement(tag);
    if (cls)  e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  };

  // ── Auth ─────────────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    $("btn-login").addEventListener("click", () => {
      signInWithPopup(auth, new GoogleAuthProvider()).catch(console.error);
    });
    $("btn-logout").addEventListener("click", () => signOut(auth));

    onAuthStateChanged(auth, user => {
      currentUser = user;
      if (user) {
        $("login-screen").style.display = "none";
        $("app-shell").style.display    = "flex";
        $("user-avatar").src            = user.photoURL || "";
        $("user-name").textContent      = user.displayName || user.email;
        subscribeData();
        renderAll();
      } else {
        $("login-screen").style.display = "flex";
        $("app-shell").style.display    = "none";
        if (unsubEvents) { unsubEvents(); unsubEvents = null; }
        if (unsubCals)   { unsubCals();   unsubCals   = null; }
        events = []; calendars = []; gcalEvents = [];
      }
    });

    // nav
    // ── Android back button ──────────────────
    history.pushState({ app: "agenda" }, "");
    window.addEventListener("popstate", () => {
      if ($("modal-overlay").style.display === "flex") {
        closeModal();
      } else {
        history.pushState({ app: "agenda" }, "");
      }
    });

    $("btn-prev").addEventListener("click",  () => navigate(-1));
    $("btn-next").addEventListener("click",  () => navigate(+1));
    $("btn-today").addEventListener("click", () => { viewDate = new Date(); renderAll(); });

    // view switcher
    document.querySelectorAll(".view-btn").forEach(b =>
      b.addEventListener("click", () => {
        currentView = b.dataset.view;
        document.querySelectorAll(".view-btn").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        renderAll();
      })
    );

    // FAB
    $("btn-new").addEventListener("click", () => openModal(null));

    // modal
    $("modal-overlay").addEventListener("click", e => {
      if (e.target === $("modal-overlay")) closeModal();
    });
    $("btn-modal-cancel").addEventListener("click", closeModal);
    $("btn-modal-save").addEventListener("click",   saveEvent);
    $("btn-modal-delete").addEventListener("click", deleteEvent);

    // sidebar
    $("btn-new-cal").addEventListener("click", () => {
      const name = prompt("Naam nieuwe agenda:");
      if (name) createCalendar(name);
    });

    // Hamburger menu (mobiel)
    $("btn-menu").addEventListener("click", () => {
      $("sidebar").classList.toggle("open");
      $("sidebar-backdrop").classList.toggle("show");
    });
    $("sidebar-backdrop").addEventListener("click", () => {
      $("sidebar").classList.remove("open");
      $("sidebar-backdrop").classList.remove("show");
    });

    // Google Calendar sync knop
    $("btn-gcal-sync").addEventListener("click", startGcalSync);

    // Rooster wizard
    $("rooster-wizard-overlay").addEventListener("click", e => {
      if (e.target === $("rooster-wizard-overlay")) closeRoosterWizard();
    });
    $("btn-rw-cancel").addEventListener("click", closeRoosterWizard);
    $("btn-rw-save").addEventListener("click",   saveRooster);
    $("rw-jaar").addEventListener("change", () => {
      $("rw-startdate").value = eersteZondagVanJaar(parseInt($("rw-jaar").value));
    });

    // Export modal
    $("export-overlay").addEventListener("click", e => {
      if (e.target === $("export-overlay")) closeExportModal();
    });
    $("btn-export-close").addEventListener("click",    closeExportModal);
    $("btn-export-ics").addEventListener("click",      downloadICS);
    $("btn-export-copy").addEventListener("click",     kopieerTekst);
    $("export-wie").addEventListener("change", e => renderExportPreview(e.target.value));

    // all-day toggle
    $("ev-allday").addEventListener("change", () => {
      $("time-fields").style.display = $("ev-allday").checked ? "none" : "flex";
    });

    // repeat toggle
    $("ev-repeat").addEventListener("change", toggleRepeatOptions);

    // type toggle → pas kleur hint aan in formulier
    $("ev-type").addEventListener("change", updateTypeHint);
  });

  // ── Google Calendar sync ─────────────────────
  function startGcalSync() {
    if (GCAL_CLIENT_ID === "JOUW_GOOGLE_CLIENT_ID.apps.googleusercontent.com") {
      showToast("⚠️ Vul eerst je Google Client ID in de code in. Zie de instructies bovenin index.html.", "warn");
      return;
    }
    // Google Identity Services token flow
    const tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID,
      scope:     GCAL_SCOPE,
      callback:  async (response) => {
        if (response.error) { console.error(response); return; }
        gcalToken = response.access_token;
        await fetchGcalEvents();
      }
    });
    tokenClient.requestAccessToken();
  }

  async function fetchGcalEvents() {
    if (!gcalToken) return;
    showToast("📥 Google Agenda wordt geladen…", "info");

    try {
      // Haal lijst van agenda's op
      const calsRes = await fetch(
        "https://www.googleapis.com/calendar/v3/users/me/calendarList",
        { headers: { Authorization: `Bearer ${gcalToken}` } }
      );
      const calsData = await calsRes.json();
      const calIds   = (calsData.items || []).map(c => c.id);

      // Tijdvenster: 1 jaar terug t/m 1 jaar vooruit
      const timeMin = new Date(); timeMin.setFullYear(timeMin.getFullYear() - 1);
      const timeMax = new Date(); timeMax.setFullYear(timeMax.getFullYear() + 1);

      let allGcal = [];
      for (const calId of calIds) {
        const evRes = await fetch(
          `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events` +
          `?maxResults=500&singleEvents=true&orderBy=startTime` +
          `&timeMin=${timeMin.toISOString()}&timeMax=${timeMax.toISOString()}`,
          { headers: { Authorization: `Bearer ${gcalToken}` } }
        );
        const evData = await evRes.json();
        const mapped = (evData.items || []).map(ev => ({
          id:        "gcal_" + ev.id,
          title:     ev.summary || "(geen titel)",
          startDate: (ev.start?.date || ev.start?.dateTime || "").slice(0, 10),
          endDate:   (ev.end?.date   || ev.end?.dateTime   || "").slice(0, 10),
          startTime: ev.start?.dateTime ? ev.start.dateTime.slice(11, 16) : null,
          endTime:   ev.end?.dateTime   ? ev.end.dateTime.slice(11, 16)   : null,
          allDay:    !!ev.start?.date,
          type:      "gcal",
          gcal:      true,
          description: ev.description || "",
        }));
        allGcal = allGcal.concat(mapped);
      }
      gcalEvents = allGcal;
      $("gcal-status").textContent = `✅ ${gcalEvents.length} Google events geladen`;
      renderAll();
      showToast(`✅ ${gcalEvents.length} Google Agenda events geladen`, "ok");
    } catch (err) {
      console.error(err);
      showToast("❌ Fout bij laden Google Agenda", "error");
    }
  }

  // ── Toast ────────────────────────────────────
  function showToast(msg, type = "info") {
    const t = $("toast");
    t.textContent = msg;
    t.className   = `toast toast-${type} show`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("show"), 3500);
  }

  // ── Firestore ────────────────────────────────
  function subscribeData() {
    const uid = currentUser.uid;
    if (unsubCals) unsubCals();
    const calQ = query(collection(db, "calendars"), where("members", "array-contains", uid));
    unsubCals = onSnapshot(calQ, snap => {
      calendars = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (calendars.length === 0) createCalendar("Persoonlijk");
      renderSidebar();
      renderAll();
    });

    subscribeRooster();

    if (unsubEvents) unsubEvents();
    const evQ = query(collection(db, "events"), where("members", "array-contains", uid));
    unsubEvents = onSnapshot(evQ, snap => {
      events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    });
  }

  async function createCalendar(name) {
    const colors = ["#4285f4","#0f9d58","#db4437","#f4b400","#ab47bc","#00acc1","#ff7043"];
    const color  = colors[Math.floor(Math.random() * colors.length)];
    await addDoc(collection(db, "calendars"), {
      name, color,
      members: [currentUser.uid],
      owner:   currentUser.uid,
      createdAt: Timestamp.now()
    });
  }

  // ── Render orchestrator ──────────────────────
  function renderAll() {
    renderHeader();
    if      (currentView === "month")   renderMonth();
    else if (currentView === "week")    renderWeek();
    else if (currentView === "day")     renderDay();
    else if (currentView === "list")    renderList();
    else if (currentView === "rooster") renderRooster();
  }

  function renderHeader() {
    let label = "";
    if (currentView === "month")
      label = `${MONTHS[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
    else if (currentView === "week") {
      const mon = startOfWeek(viewDate);
      const sun = new Date(mon); sun.setDate(sun.getDate() + 6);
      label = `${mon.getDate()} ${MONTHS[mon.getMonth()].slice(0,3)} – ${sun.getDate()} ${MONTHS[sun.getMonth()].slice(0,3)} ${sun.getFullYear()}`;
    } else if (currentView === "day")
      label = `${WEEKDAYS_LONG[viewDate.getDay()]} ${viewDate.getDate()} ${MONTHS[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
    else if (currentView === "rooster") label = "🏃 Trainingsrooster";
    else label = "Aankomende afspraken";
    $("view-title").textContent = label;
  }

  // ── Alle events (eigen + gcal) gecombineerd ──
  function allEvents() {
    return [...events, ...gcalEvents];
  }

  // ── Event kleur & icoon ──────────────────────
  function eventColor(ev) {
    if (ev.gcal) return "#34a853";
    const type = EVENT_TYPES[ev.type];
    if (type && type.color) return type.color;
    const cal = getCalendar(ev.calendarId);
    return cal?.color || "#4285f4";
  }

  function eventIcon(ev) {
    if (ev.gcal) return "📆";
    return EVENT_TYPES[ev.type]?.icon || "📅";
  }

  // ── MONTH VIEW ───────────────────────────────
  function renderMonth() {
    const grid = $("calendar-grid");
    grid.innerHTML = "";
    grid.className = "grid-month";

    const year = viewDate.getFullYear(), month = viewDate.getMonth();
    const first    = new Date(year, month, 1);
    const startDay = (first.getDay() + 6) % 7;

    ["Ma","Di","Wo","Do","Vr","Za","Zo"].forEach(d => {
      grid.appendChild(el("div", "grid-header", d));
    });

    for (let i = 0; i < startDay; i++)
      grid.appendChild(el("div", "day-cell other-month"));

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const dateObj = new Date(year, month, d);
      const cell    = el("div", "day-cell");
      if (isSameDay(dateObj, today)) cell.classList.add("today");

      const dayEvs    = getEventsForDay(dateObj);
      const alldayEvs = dayEvs.filter(ev => ev.allDay);
      const timedEvs  = dayEvs.filter(ev => !ev.allDay);

      // Hele-dag events: volle balk BOVEN dagcijfer
      alldayEvs.slice(0, 2).forEach(ev => {
        const bar = el("div", "ev-allday-bar");
        bar.style.background = eventColor(ev);
        bar.textContent = `${eventIcon(ev)} ${ev.title}`;
        bar.addEventListener("click", e => { e.stopPropagation(); openModal(ev); });
        cell.appendChild(bar);
      });

      // Dagcijfer
      cell.appendChild(el("div", "day-number", String(d)));

      // Getijde events
      timedEvs.slice(0, 2).forEach(ev => {
        const pill = el("div", "ev-pill");
        pill.style.background = eventColor(ev);
        pill.textContent = `${eventIcon(ev)} ${ev.title}`;
        if (ev.gcal) pill.classList.add("ev-pill-gcal");
        pill.addEventListener("click", e => { e.stopPropagation(); openModal(ev); });
        cell.appendChild(pill);
      });

      const shown = Math.min(alldayEvs.length, 2) + Math.min(timedEvs.length, 2);
      if (dayEvs.length > shown)
        cell.appendChild(el("div", "ev-more", `+${dayEvs.length - shown} meer`));

      cell.addEventListener("click", () => {
        viewDate = dateObj; currentView = "day";
        document.querySelectorAll(".view-btn").forEach(x => x.classList.remove("active"));
        document.querySelector('[data-view="day"]').classList.add("active");
        renderAll();
      });
      grid.appendChild(cell);
    }
  }

  // ── WEEK VIEW ────────────────────────────────
  function renderWeek() {
    const grid = $("calendar-grid");
    grid.innerHTML = "";
    grid.className = "grid-week";

    const mon = startOfWeek(viewDate);
    const headerRow = el("div", "week-header-row");
    headerRow.appendChild(el("div", "time-gutter", ""));

    const cols = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(mon); d.setDate(d.getDate() + i);
      const isToday = isSameDay(d, today);
      const hd = el("div", `week-day-header${isToday ? " today" : ""}`,
        `<div class="wdh-name">${WEEKDAYS_SHORT[d.getDay()]}</div><div class="wdh-num">${d.getDate()}</div>`);
      hd.addEventListener("click", () => {
        viewDate = d; currentView = "day";
        document.querySelectorAll(".view-btn").forEach(x => x.classList.remove("active"));
        document.querySelector('[data-view="day"]').classList.add("active");
        renderAll();
      });
      headerRow.appendChild(hd);
      cols.push(d);
    }
    grid.appendChild(headerRow);

    const body = el("div", "week-body");
    const timeCol = el("div", "time-col");
    for (let h = 0; h < 24; h++)
      timeCol.appendChild(el("div", "time-label", `${String(h).padStart(2,"0")}:00`));
    body.appendChild(timeCol);

    cols.forEach(d => {
      const dc = el("div", "week-day-col");
      for (let h = 0; h < 24; h++) {
        const slot = el("div", "hour-slot");
        slot.addEventListener("click", () => { const dt = new Date(d); dt.setHours(h,0); openModal(null, dt); });
        dc.appendChild(slot);
      }
      getEventsForDay(d).forEach(ev => placeEventInCol(dc, ev));
      body.appendChild(dc);
    });
    grid.appendChild(body);
    setTimeout(() => { body.scrollTop = 8 * 48; }, 50);
  }

  function placeEventInCol(col, ev) {
    if (ev.allDay) return;
    const start  = ev.startTime ? parseTime(ev.startTime) : 0;
    const end    = ev.endTime   ? parseTime(ev.endTime)   : start + 60;
    const top    = (start / 60) * 48;
    const height = Math.max(((end - start) / 60) * 48, 22);
    const color  = eventColor(ev);
    const icon   = eventIcon(ev);
    const pill   = el("div", "week-ev-pill");
    pill.style.top    = top + "px";
    pill.style.height = height + "px";
    pill.style.background = color;
    pill.innerHTML = `<span class="ev-icon">${icon}</span> ${ev.title}`;
    pill.addEventListener("click", e => { e.stopPropagation(); openModal(ev); });
    col.appendChild(pill);
  }

  // ── DAY VIEW ─────────────────────────────────
  function renderDay() {
    const grid = $("calendar-grid");
    grid.innerHTML = "";
    grid.className = "grid-day";

    const body    = el("div", "day-body");
    const timeCol = el("div", "time-col");
    for (let h = 0; h < 24; h++)
      timeCol.appendChild(el("div", "time-label", `${String(h).padStart(2,"0")}:00`));
    body.appendChild(timeCol);

    const dc = el("div", "day-col");
    for (let h = 0; h < 24; h++) {
      const slot = el("div", "hour-slot");
      slot.addEventListener("click", () => { const dt = new Date(viewDate); dt.setHours(h,0); openModal(null, dt); });
      dc.appendChild(slot);
    }
    getEventsForDay(viewDate).forEach(ev => placeEventInCol(dc, ev));
    body.appendChild(dc);
    grid.appendChild(body);
    setTimeout(() => { body.scrollTop = 8 * 48; }, 50);
  }

  // ── LIST VIEW ────────────────────────────────
  function renderList() {
    const grid = $("calendar-grid");
    grid.innerHTML = "";
    grid.className = "grid-list";

    const now = new Date(); now.setHours(0,0,0,0);
    const sorted = allEvents()
      .filter(ev => toDate(ev.startDate || ev.date) >= now)
      .sort((a,b) => toDate(a.startDate||a.date) - toDate(b.startDate||b.date));

    if (sorted.length === 0) {
      grid.appendChild(el("div", "list-empty", "Geen aankomende afspraken."));
      return;
    }

    let lastLabel = "";
    sorted.forEach(ev => {
      const d   = toDate(ev.startDate || ev.date);
      const lbl = `${WEEKDAYS_LONG[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
      if (lbl !== lastLabel) {
        grid.appendChild(el("div", "list-date-header", lbl));
        lastLabel = lbl;
      }
      const color = eventColor(ev);
      const icon  = eventIcon(ev);
      const row   = el("div", ev.gcal ? "list-ev-row list-gcal" : "list-ev-row");
      row.innerHTML = `
        <span class="list-dot" style="background:${color}"></span>
        <span class="ev-icon">${icon}</span>
        <span class="list-time">${ev.allDay ? "Hele dag" : (ev.startTime||"")}</span>
        <span class="list-title">${ev.title}</span>
        ${ev.gcal ? '<span class="gcal-badge">Google</span>' : ""}
      `;
      row.addEventListener("click", () => openModal(ev));
      grid.appendChild(row);
    });
  }

  // ── SIDEBAR ──────────────────────────────────
  function renderSidebar() {
    const list = $("cal-list");
    list.innerHTML = "";
    calendars.forEach(cal => {
      const item = el("div", "cal-item");
      item.innerHTML = `
        <span class="cal-dot" style="background:${cal.color}"></span>
        <span class="cal-name">${cal.name}</span>
      `;
      list.appendChild(item);
    });

    // Legenda event types
    const legend = $("type-legend");
    legend.innerHTML = "";
    Object.entries(EVENT_TYPES).forEach(([key, t]) => {
      const item = el("div", "cal-item");
      item.innerHTML = `<span class="ev-icon" style="font-size:1rem">${t.icon}</span><span class="cal-name">${t.label}</span>`;
      legend.appendChild(item);
    });
    // Google
    const gitem = el("div", "cal-item");
    gitem.innerHTML = `<span class="ev-icon" style="font-size:1rem">📆</span><span class="cal-name" style="color:#34a853">Google Agenda</span>`;
    legend.appendChild(gitem);
  }

  // ── MODAL ────────────────────────────────────
  function openModal(ev, prefillDate) {
    // Google Calendar events zijn read-only
    if (ev && ev.gcal) {
      showGcalDetail(ev);
      return;
    }

    editingEvent = ev;
    $("modal-overlay").style.display = "flex";

    const sel = $("ev-calendar");
    sel.innerHTML = "";
    calendars.forEach(cal => {
      const o = document.createElement("option");
      o.value = cal.id; o.textContent = cal.name;
      if (ev && ev.calendarId === cal.id) o.selected = true;
      sel.appendChild(o);
    });

    if (ev) {
      $("modal-title-text").textContent  = "Afspraak bewerken";
      $("btn-modal-delete").style.display = "inline-flex";
      $("ev-title").value      = ev.title || "";
      $("ev-type").value       = ev.type  || "afspraak";
      $("ev-allday").checked   = !!ev.allDay;
      $("ev-start-date").value = ev.startDate || ev.date || "";
      $("ev-end-date").value   = ev.endDate   || ev.date || "";
      $("ev-start-time").value = ev.startTime || "09:00";
      $("ev-end-time").value   = ev.endTime   || "10:00";
      $("ev-desc").value       = ev.description || "";
      $("ev-repeat").value     = ev.repeat || "none";
      $("time-fields").style.display = ev.allDay ? "none" : "flex";
    } else {
      $("modal-title-text").textContent  = "Nieuwe afspraak";
      $("btn-modal-delete").style.display = "none";
      const base = prefillDate || new Date();
      $("ev-title").value      = "";
      $("ev-type").value       = "afspraak";
      $("ev-allday").checked   = false;
      $("ev-start-date").value = toISO(base);
      $("ev-end-date").value   = toISO(base);
      $("ev-start-time").value = `${String(base.getHours()).padStart(2,"0")}:00`;
      $("ev-end-time").value   = `${String(base.getHours()+1).padStart(2,"0")}:00`;
      $("ev-desc").value       = "";
      $("ev-repeat").value     = "none";
      $("time-fields").style.display = "flex";
    }

    updateTypeHint();
    toggleRepeatOptions();
    $("ev-title").focus();
  }

  function showGcalDetail(ev) {
    // Eenvoudig read-only detail popup voor Google Agenda events
    const overlay = $("modal-overlay");
    overlay.style.display = "flex";
    $("modal-title-text").textContent = "📆 Google Agenda (alleen lezen)";
    $("btn-modal-delete").style.display = "none";
    $("btn-modal-save").style.display   = "none";
    $("ev-title").value      = ev.title;
    $("ev-title").disabled   = true;
    $("ev-type").value       = "afspraak";
    $("ev-type").disabled    = true;
    $("ev-allday").checked   = ev.allDay;
    $("ev-allday").disabled  = true;
    $("ev-start-date").value = ev.startDate || "";
    $("ev-start-date").disabled = true;
    $("ev-end-date").value   = ev.endDate || "";
    $("ev-end-date").disabled = true;
    $("ev-start-time").value = ev.startTime || "";
    $("ev-start-time").disabled = true;
    $("ev-end-time").value   = ev.endTime || "";
    $("ev-end-time").disabled = true;
    $("ev-desc").value       = ev.description || "";
    $("ev-desc").disabled    = true;
    $("ev-repeat").value     = "none";
    $("ev-repeat").disabled  = true;
    $("time-fields").style.display = ev.allDay ? "none" : "flex";

    // herstel bij sluiten
    $("modal-overlay").dataset.gcal = "1";
  }

  function closeModal() {
    $("modal-overlay").style.display = "none";
    editingEvent = null;
    // reset disabled states (voor gcal detail)
    ["ev-title","ev-type","ev-allday","ev-start-date","ev-end-date",
     "ev-start-time","ev-end-time","ev-desc","ev-repeat"].forEach(id => {
      $(id).disabled = false;
    });
    $("btn-modal-save").style.display = "inline-flex";
    delete $("modal-overlay").dataset.gcal;
  }

  function updateTypeHint() {
    const type = $("ev-type").value;
    const t    = EVENT_TYPES[type];
    $("type-icon-preview").textContent = t ? t.icon : "📅";

    // Verjaardagen en bijzondere dagen: standaard hele dag
    if (type === "verjaardag" || type === "bijzonder" || type === "vakantie" || type === "sterfdag") {
      $("ev-allday").checked = true;
      $("time-fields").style.display = "none";
    }
    // Verjaardagen: standaard jaarlijks herhalen
    if (type === "verjaardag" || type === "sterfdag") {
      $("ev-repeat").value = "yearly";
      $("repeat-options").style.display = "none";
    }
  }

  function toggleRepeatOptions() {
    $("repeat-options").style.display =
      $("ev-repeat").value !== "none" ? "flex" : "none";
  }

  async function saveEvent() {
    if ($("modal-overlay").dataset.gcal) return; // read-only
    const title = $("ev-title").value.trim();
    if (!title) { $("ev-title").focus(); return; }

    const data = {
      title,
      type:        $("ev-type").value || "afspraak",
      allDay:      $("ev-allday").checked,
      startDate:   $("ev-start-date").value,
      endDate:     $("ev-end-date").value,
      startTime:   $("ev-start-time").value,
      endTime:     $("ev-end-time").value,
      description: $("ev-desc").value.trim(),
      calendarId:  $("ev-calendar").value,
      repeat:      $("ev-repeat").value,
      repeatEnd:   $("ev-repeat-end").value || null,
      members:     [currentUser.uid],
      updatedAt:   Timestamp.now()
    };

    if (editingEvent) {
      await updateDoc(doc(db, "events", editingEvent.id), data);
    } else {
      data.createdAt = Timestamp.now();
      data.createdBy = currentUser.uid;
      await addDoc(collection(db, "events"), data);
    }
    closeModal();
  }

  async function deleteEvent() {
    if (!editingEvent) return;
    if (!confirm(`"${editingEvent.title}" verwijderen?`)) return;
    await deleteDoc(doc(db, "events", editingEvent.id));
    closeModal();
  }

  // ── Navigation ────────────────────────────────
  function navigate(dir) {
    const d = new Date(viewDate);
    if      (currentView === "month") d.setMonth(d.getMonth() + dir);
    else if (currentView === "week")  d.setDate(d.getDate() + dir * 7);
    else if (currentView === "day")   d.setDate(d.getDate() + dir);
    else                              d.setDate(d.getDate() + dir * 14);
    viewDate = d;
    renderAll();
  }

  // ── Helpers ───────────────────────────────────
  function isSameDay(a, b) {
    return a.getFullYear() === b.getFullYear() &&
           a.getMonth()    === b.getMonth()    &&
           a.getDate()     === b.getDate();
  }

  function toDate(str) {
    if (!str) return new Date(0);
    if (str && typeof str.toDate === "function") return str.toDate();
    return new Date(str + "T00:00:00");
  }

  function toISO(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  function parseTime(t) {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + (m || 0);
  }

  function startOfWeek(d) {
    const r   = new Date(d);
    const day = (r.getDay() + 6) % 7;
    r.setDate(r.getDate() - day);
    r.setHours(0,0,0,0);
    return r;
  }

  function getCalendar(id) {
    return calendars.find(c => c.id === id) || null;
  }

  function getEventsForDay(date) {
    return allEvents().filter(ev => {
      const start = toDate(ev.startDate || ev.date);
      const end   = toDate(ev.endDate   || ev.startDate || ev.date);
      const s = new Date(start); s.setHours(0,0,0,0);
      const e = new Date(end);   e.setHours(0,0,0,0);
      const t = new Date(date);  t.setHours(0,0,0,0);

      if (!ev.repeat || ev.repeat === "none") return s <= t && t <= e;
      return matchesRepeat(ev, date);
    }).sort((a,b) => (a.startTime||"00:00").localeCompare(b.startTime||"00:00"));
  }

  function matchesRepeat(ev, date) {
    const origin = toDate(ev.startDate || ev.date);
    origin.setHours(0,0,0,0);
    const t = new Date(date); t.setHours(0,0,0,0);
    if (t < origin) return false;
    if (ev.repeatEnd) {
      const re = toDate(ev.repeatEnd); re.setHours(0,0,0,0);
      if (t > re) return false;
    }
    const diff = Math.round((t - origin) / 86400000);
    if (ev.repeat === "daily")   return true;
    if (ev.repeat === "weekly")  return diff % 7 === 0;
    if (ev.repeat === "monthly") return origin.getDate() === t.getDate();
    if (ev.repeat === "yearly")  return origin.getDate() === t.getDate() && origin.getMonth() === t.getMonth();
    return false;
  }

  // TRAININGSROOSTER MODULE
  // ══════════════════════════════════════════════════════

  // Rooster-state (wordt ook in Firestore opgeslagen)
  let roosterConfig = null;   // { startDate, naam1, naam2, patroon, weken: [{datum, wie, swap}] }
  let unsubRooster  = null;

  function subscribeRooster() {
    if (unsubRooster) unsubRooster();
    const ref = doc(db, "roosters", currentUser.uid);
    unsubRooster = onSnapshot(ref, snap => {
      roosterConfig = snap.exists() ? snap.data() : null;
      if (currentView === "rooster") renderRooster();
    });
  }

  // ── Rooster weergave ──────────────────────────────────
  function renderRooster() {
    const grid = $("calendar-grid");
    grid.innerHTML = "";
    grid.className = "grid-rooster";

    if (!roosterConfig) {
      // Welkomstscherm: nieuw rooster aanmaken
      const wrap = el("div", "rooster-welcome");
      wrap.innerHTML = `
        <div class="rooster-welcome-icon">🏃</div>
        <h2>Trainingsrooster</h2>
        <p>Maak een jaarplanning voor jouw training.<br>
           Stel het basispatroon in en exporteer naar je trainingspartner.</p>
        <button class="btn-primary" id="btn-rooster-nieuw" style="margin-top:16px;font-size:1rem;padding:12px 28px">
          ＋ Nieuw rooster aanmaken
        </button>
      `;
      grid.appendChild(wrap);
      $("btn-rooster-nieuw").addEventListener("click", openRoosterWizard);
      return;
    }

    // Header met acties
    const hdr = el("div", "rooster-header");
    hdr.innerHTML = `
      <div class="rooster-hdr-left">
        <span class="rooster-title">🏃 Trainingsrooster ${roosterConfig.jaar || ""}</span>
        <span class="rooster-sub">${roosterConfig.naam1} &amp; ${roosterConfig.naam2} · patroon ${roosterConfig.patroon[0]}/${roosterConfig.patroon[1]}</span>
      </div>
      <div class="rooster-hdr-actions">
        <button class="btn-ghost btn-sm" id="btn-rooster-edit">✏️ Bewerken</button>
        <button class="btn-ghost btn-sm" id="btn-rooster-export">📤 Exporteren</button>
        <button class="btn-ghost btn-sm btn-danger-sm" id="btn-rooster-delete">🗑</button>
      </div>
    `;
    grid.appendChild(hdr);
    $("btn-rooster-edit").addEventListener("click", openRoosterWizard);
    $("btn-rooster-export").addEventListener("click", openExportModal);
    $("btn-rooster-delete").addEventListener("click", deleteRooster);

    // Legenda
    const leg = el("div", "rooster-legend");
    leg.innerHTML = `
      <span class="rleg-item"><span class="rleg-dot" style="background:#00897b"></span>${roosterConfig.naam1} (jij)</span>
      <span class="rleg-item"><span class="rleg-dot" style="background:#5c6bc0"></span>${roosterConfig.naam2}</span>
      <span class="rleg-item"><span class="rleg-dot rleg-swap"></span>Geruild</span>
    `;
    grid.appendChild(leg);

    // Weeklijst
    const list = el("div", "rooster-list");
    const weken = roosterConfig.weken || [];
    let lastMonth = -1;

    weken.forEach((week, idx) => {
      const d = new Date(week.datum + "T00:00:00");
      if (d.getMonth() !== lastMonth) {
        const mhdr = el("div", "rooster-month-hdr",
          `${MONTHS[d.getMonth()]} ${d.getFullYear()}`);
        list.appendChild(mhdr);
        lastMonth = d.getMonth();
      }

      const isJij   = week.wie === "naam1";
      const naam    = isJij ? roosterConfig.naam1 : roosterConfig.naam2;
      const kleur   = isJij ? "#00897b" : "#5c6bc0";
      const isPast  = d < today;

      const row = el("div", `rooster-row${isPast ? " rooster-past" : ""}${week.swap ? " rooster-swapped" : ""}`);
      row.innerHTML = `
        <div class="rooster-datum">
          <span class="rooster-dag">${WEEKDAYS_SHORT[d.getDay()]}</span>
          <span class="rooster-dd">${String(d.getDate()).padStart(2,"0")}</span>
          <span class="rooster-mnd">${MONTHS[d.getMonth()].slice(0,3)}</span>
        </div>
        <div class="rooster-wie" style="background:${kleur}20;border-left:3px solid ${kleur}">
          <span class="rooster-naam" style="color:${kleur}">${naam}</span>
          ${week.swap ? '<span class="rooster-swap-badge">↔ geruild</span>' : ""}
          ${week.notitie ? `<span class="rooster-notitie">${week.notitie}</span>` : ""}
        </div>
        <div class="rooster-actions">
          <button class="rooster-btn-swap" title="Ruil deze week" data-idx="${idx}">↔</button>
          <button class="rooster-btn-note" title="Notitie" data-idx="${idx}">✏️</button>
        </div>
      `;
      list.appendChild(row);
    });

    grid.appendChild(list);

    // Event listeners voor swap/notitie knoppen
    grid.querySelectorAll(".rooster-btn-swap").forEach(btn =>
      btn.addEventListener("click", () => swapWeek(parseInt(btn.dataset.idx)))
    );
    grid.querySelectorAll(".rooster-btn-note").forEach(btn =>
      btn.addEventListener("click", () => addNoteToWeek(parseInt(btn.dataset.idx)))
    );
  }

  // ── Rooster wizard (aanmaken/bewerken) ───────────────
  function openRoosterWizard() {
    const cfg = roosterConfig;
    const jaar = cfg?.jaar || new Date().getFullYear();
    const naam1 = cfg?.naam1 || currentUser.displayName?.split(" ")[0] || "Ik";
    const naam2 = cfg?.naam2 || "";
    const pat1  = cfg?.patroon?.[0] ?? 2;
    const pat2  = cfg?.patroon?.[1] ?? 2;
    // Eerste zondag van het jaar als startdatum
    const eersteZondag = cfg?.startDate || eersteZondagVanJaar(jaar);

    const ov = $("rooster-wizard-overlay");
    ov.style.display = "flex";
    $("rw-jaar").value       = jaar;
    $("rw-naam1").value      = naam1;
    $("rw-naam2").value      = naam2;
    $("rw-patroon1").value   = pat1;
    $("rw-patroon2").value   = pat2;
    $("rw-startdate").value  = eersteZondag;
  }

  function closeRoosterWizard() {
    $("rooster-wizard-overlay").style.display = "none";
  }

  async function saveRooster() {
    const jaar     = parseInt($("rw-jaar").value);
    const naam1    = $("rw-naam1").value.trim() || "Ik";
    const naam2    = $("rw-naam2").value.trim() || "Vriend";
    const pat1     = parseInt($("rw-patroon1").value) || 2;
    const pat2     = parseInt($("rw-patroon2").value) || 2;
    const startStr = $("rw-startdate").value;

    if (!startStr) { alert("Vul een startdatum in."); return; }

    // Genereer alle zondagen in het jaar met basispatroon
    const weken = genereerWeken(startStr, jaar, pat1, pat2,
                                roosterConfig?.weken || []);

    const config = {
      jaar, naam1, naam2,
      patroon:   [pat1, pat2],
      startDate: startStr,
      weken,
      updatedAt: Timestamp.now()
    };

    await setDoc(doc(db, "roosters", currentUser.uid), config);
    closeRoosterWizard();
    showToast("✅ Rooster opgeslagen", "ok");

    // Zet alle training-events in Firestore
    await syncRoosterToEvents(config);
  }

  function genereerWeken(startStr, jaar, pat1, pat2, bestaandeWeken) {
    const start = new Date(startStr + "T00:00:00");
    const weken = [];
    let patIdx  = 0;    // welke blok zijn we
    let teller  = 0;    // hoe ver in huidig blok

    // Bewaar bestaande swaps/notities op datum
    const bestaandeMap = {};
    bestaandeWeken.forEach(w => { bestaandeMap[w.datum] = w; });

    let d = new Date(start);
    while (d.getFullYear() <= jaar) {
      const isoStr  = toISO(d);
      const inBlok1 = (patIdx % 2 === 0);  // even blok = naam1, oneven = naam2
      const wie     = inBlok1 ? "naam1" : "naam2";
      const patLen  = inBlok1 ? pat1 : pat2;

      const bestaande = bestaandeMap[isoStr];
      weken.push({
        datum:   isoStr,
        wie:     bestaande?.swap ? (wie === "naam1" ? "naam2" : "naam1") : wie,
        swap:    bestaande?.swap    || false,
        notitie: bestaande?.notitie || "",
        origineel: wie   // bewaar origineel patroon
      });

      teller++;
      if (teller >= patLen) { teller = 0; patIdx++; }
      d.setDate(d.getDate() + 7);
    }
    return weken;
  }

  async function syncRoosterToEvents(config) {
    // Verwijder eerst bestaande training-events van deze user
    const q = query(collection(db, "events"),
      where("members", "array-contains", currentUser.uid),
      where("type", "==", "training"),
      where("rooster", "==", true)
    );
    const snap = await getDocs(q);
    await Promise.all(snap.docs.map(d => deleteDoc(doc(db, "events", d.id))));

    // Voeg nieuwe events toe
    const batch = config.weken.map(week => ({
      title:      `🏃 Training — ${week.wie === "naam1" ? config.naam1 : config.naam2}`,
      type:       "training",
      allDay:     true,
      startDate:  week.datum,
      endDate:    week.datum,
      calendarId: "",
      rooster:    true,
      wie:        week.wie,
      swap:       week.swap,
      notitie:    week.notitie,
      members:    [currentUser.uid],
      createdAt:  Timestamp.now()
    }));

    await Promise.all(batch.map(ev => addDoc(collection(db, "events"), ev)));
    showToast(`📅 ${batch.length} trainingen in agenda gezet`, "info");
  }

  // ── Swap week ─────────────────────────────────────────
  async function swapWeek(idx) {
    const weken = [...roosterConfig.weken];
    const w     = { ...weken[idx] };
    w.wie  = w.wie === "naam1" ? "naam2" : "naam1";
    w.swap = !w.swap;
    weken[idx] = w;
    await updateDoc(doc(db, "roosters", currentUser.uid), { weken, updatedAt: Timestamp.now() });
    await syncRoosterToEvents({ ...roosterConfig, weken });
    showToast("↔ Week geruild", "ok");
  }

  async function addNoteToWeek(idx) {
    const huidig = roosterConfig.weken[idx].notitie || "";
    const nieuw  = prompt("Notitie voor deze week:", huidig);
    if (nieuw === null) return;
    const weken = [...roosterConfig.weken];
    weken[idx] = { ...weken[idx], notitie: nieuw };
    await updateDoc(doc(db, "roosters", currentUser.uid), { weken, updatedAt: Timestamp.now() });
    showToast("📝 Notitie opgeslagen", "ok");
  }

  async function deleteRooster() {
    if (!confirm("Rooster verwijderen? Dit verwijdert ook alle training-events uit je agenda.")) return;
    await deleteDoc(doc(db, "roosters", currentUser.uid));
    // Verwijder training events
    const q = query(collection(db, "events"),
      where("members", "array-contains", currentUser.uid),
      where("type", "==", "training"),
      where("rooster", "==", true)
    );
    const snap = await getDocs(q);
    await Promise.all(snap.docs.map(d => deleteDoc(doc(db, "events", d.id))));
    showToast("🗑 Rooster verwijderd", "warn");
  }

  // ── Export ────────────────────────────────────────────
  function openExportModal() {
    $("export-overlay").style.display = "flex";
    renderExportPreview("naam2"); // standaard: export voor vriend
  }
  function closeExportModal() { $("export-overlay").style.display = "none"; }

  function renderExportPreview(wie) {
    const cfg   = roosterConfig;
    const naam  = wie === "naam1" ? cfg.naam1 : cfg.naam2;
    const weken = cfg.weken.filter(w => w.wie === wie);

    // Tekstlijst
    const lines = weken.map(w => {
      const d = new Date(w.datum + "T00:00:00");
      return `${WEEKDAYS_LONG[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}${w.notitie ? " — " + w.notitie : ""}`;
    });

    $("export-preview-naam").textContent = naam;
    $("export-count").textContent        = weken.length;
    $("export-tekst").value              = lines.join("\n");
    $("export-wie").value                = wie;

    // Update naam labels
    $("export-lbl-naam1").textContent = cfg.naam1 + " (jij)";
    $("export-lbl-naam2").textContent = cfg.naam2;
  }

  function generateICS(wie) {
    const cfg   = roosterConfig;
    const naam  = wie === "naam1" ? cfg.naam1 : cfg.naam2;
    const weken = cfg.weken.filter(w => w.wie === wie);

    const lines = [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//MyAgenda//Trainingsrooster//NL",
      "CALNAME:Training " + naam,
      "X-WR-CALNAME:Training " + naam,
    ];

    weken.forEach(w => {
      const d   = w.datum.replace(/-/g, "");
      const uid = `training-${w.datum}-${wie}@myagenda`;
      lines.push("BEGIN:VEVENT");
      lines.push("UID:" + uid);
      lines.push("DTSTART;VALUE=DATE:" + d);
      lines.push("DTEND;VALUE=DATE:" + d);
      lines.push("SUMMARY:🏃 Training");
      if (w.notitie) lines.push("DESCRIPTION:" + w.notitie);
      if (w.swap)    lines.push("COMMENT:Geruild");
      lines.push("END:VEVENT");
    });

    lines.push("END:VCALENDAR");
    return lines.join("\r\n");
  }

  function downloadICS() {
    const wie  = $("export-wie").value;
    const naam = wie === "naam1" ? roosterConfig.naam1 : roosterConfig.naam2;
    const ics  = generateICS(wie);
    const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `Training_${naam}_${roosterConfig.jaar}.ics`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("📥 .ics gedownload", "ok");
  }

  function kopieerTekst() {
    const txt = $("export-tekst").value;
    navigator.clipboard.writeText(txt).then(() => showToast("📋 Gekopieerd", "ok"));
  }

  // ── Helpers ────────────────────────────────────────────
  function eersteZondagVanJaar(jaar) {
    const d = new Date(jaar, 0, 1);
    while (d.getDay() !== 0) d.setDate(d.getDate() + 1);
    return toISO(d);
  }

</script>

  @media(min-width:700px) { .day-cell { min-height: 110px; padding: 4px; } }
  .day-cell:hover { background: #f1f3f4; }
  .day-cell.other-month { background: #fafafa; }
  .day-cell.today .day-number {
    background: var(--today-bg); color: var(--today-fg);
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
  }
  @media(min-width:480px) {
    .day-cell.today .day-number { width: 26px; height: 26px; }
  }
  .day-number {
    font-size: .72rem; font-weight: 500;
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 20px; min-height: 20px;
    padding: 1px; margin-bottom: 1px;
  }
  @media(min-width:480px) {
    .day-number { font-size: .82rem; min-width: 26px; min-height: 26px;
                  padding: 2px; margin-bottom: 2px; }
  }

  /* Hele-dag balk: strekt over volle breedte cel, boven dagcijfer */
  .ev-allday-bar {
    display: block;
    color: #fff;
    border-radius: 2px;
    padding: 1px 2px;
    font-size: .60rem;
    margin-bottom: 1px;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
    box-sizing: border-box;
    line-height: 1.3;
    transition: filter .1s;
  }
  .ev-allday-bar:hover { filter: brightness(1.1); }
  @media(min-width:480px) { .ev-allday-bar { font-size: .70rem; padding: 1px 4px; } }
  @media(min-width:700px) { .ev-allday-bar { font-size: .76rem; padding: 2px 5px; } }

  /* Getijde event pill */
  .ev-pill {
    display: flex; align-items: center; gap: 2px;
    color: #fff; border-radius: 3px;
    padding: 1px 2px;
    font-size: .60rem;
    margin-bottom: 1px;
    cursor: pointer;
    overflow: hidden;
    width: 100%;
    box-sizing: border-box;
    transition: filter .1s;
  }
  .ev-pill:hover { filter: brightness(1.12); }
  .ev-pill-gcal { opacity: .88; }
  @media(min-width:480px) { .ev-pill { font-size: .70rem; padding: 1px 4px; } }
  @media(min-width:700px) { .ev-pill { font-size: .77rem; padding: 2px 5px; border-radius: 4px; } }
  .ev-icon { font-size: .9em; flex-shrink: 0; line-height: 1; }
  /* Verberg icoon op heel smalle kolommen */
  @media(max-width:380px) { .ev-icon { display: none; } }
  .ev-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .ev-more { font-size: .62rem; color: var(--muted); padding-left: 2px; }
  @media(min-width:480px) { .ev-more { font-size: .73rem; } }

  /* ── Week / Day grid ────────────────────────── */
  .grid-week, .grid-day { display: flex; flex-direction: column; height: 100%; }
  .week-header-row {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .time-gutter { width: 36px; flex-shrink: 0; }
  @media(min-width:500px) { .time-gutter { width: 52px; } }
  .week-day-header {
    flex: 1; text-align: center; padding: 8px 4px; cursor: pointer;
    font-size: .82rem; color: var(--muted); border-left: 1px solid var(--border);
    transition: background .1s;
  }
  .week-day-header:hover { background: #f1f3f4; }
  .week-day-header.today { color: var(--primary); }
  .week-day-header.today .wdh-num {
    background: var(--today-bg); color: #fff;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; margin: 0 auto; font-weight: 700;
  }
  .wdh-name { font-size: .70rem; text-transform: uppercase; font-weight: 700; }
  .wdh-num  { font-size: 1.1rem; font-weight: 400; line-height: 1; margin-top: 2px; }
  .week-body, .day-body { display: flex; flex: 1; overflow-y: auto; }
  .time-col { width: 36px; flex-shrink: 0; display: flex; flex-direction: column; }
  @media(min-width:500px) { .time-col { width: 52px; } }
  .time-label {
    height: 48px; font-size: .70rem; color: var(--muted);
    text-align: right; padding-right: 6px;
    display: flex; align-items: flex-start; padding-top: 2px;
  }
  .week-day-col, .day-col { flex: 1; position: relative; border-left: 1px solid var(--border); min-width: 0; }
  .hour-slot { height: 48px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .1s; }
  .hour-slot:hover { background: #f1f3f4; }
  .week-ev-pill {
    position: absolute; left: 2px; right: 2px;
    color: #fff; border-radius: 4px; padding: 2px 4px;
    font-size: .74rem; overflow: hidden; cursor: pointer;
    z-index: 2; transition: filter .1s;
  }
  .week-ev-pill:hover { filter: brightness(1.12); }

  /* ── List view ──────────────────────────────── */
  .grid-list { padding: 16px 24px; display: flex; flex-direction: column; gap: 2px; }
  .list-date-header {
    font-size: .83rem; font-weight: 700; color: var(--muted);
    padding: 12px 0 4px; text-transform: uppercase; letter-spacing: .04em;
  }
  .list-ev-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 8px; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border);
    margin-bottom: 4px; transition: box-shadow .15s;
  }
  .list-ev-row:hover { box-shadow: var(--shadow); }
  .list-gcal { border-color: #c8e6c9; background: #f1f8f1; }
  .list-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .list-time { font-size: .80rem; color: var(--muted); min-width: 60px; }
  .list-title { font-size: .90rem; flex: 1; }
  .list-empty { padding: 48px; text-align: center; color: var(--muted); font-size: .95rem; }
  .gcal-badge {
    font-size: .70rem; background: #e6f4ea; color: #34a853;
    border: 1px solid #c8e6c9; border-radius: 10px; padding: 1px 6px;
  }

  /* ── Modal ──────────────────────────────────── */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); z-index: 200;
    align-items: center; justify-content: center; padding: 16px;
  }
  #modal {
    background: var(--surface); border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
    width: 100%; max-width: 490px; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    animation: popIn .18s ease;
    max-height: 92dvh; overflow-y: auto;
  }
  @media(max-width:500px) {
    #modal-overlay { padding: 0; align-items: flex-end; }
    #modal { border-radius: 16px 16px 0 0; max-height: 88dvh; padding: 16px 14px; }
  }
  @keyframes popIn { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #modal-title-text { font-size: 1.1rem; font-weight: 600; }
  .form-row { display: flex; flex-direction: column; gap: 4px; }
  .form-row label { font-size: .78rem; color: var(--muted); font-weight: 600; }
  .form-row input, .form-row textarea, .form-row select {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-size: .91rem; font-family: var(--font);
    outline: none; transition: border-color .15s; background: var(--surface);
  }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color: var(--primary); }
  .form-row textarea { resize: vertical; min-height: 60px; }
  .form-inline { display: flex; align-items: center; gap: 8px; font-size: .9rem; }
  #time-fields { display: flex; gap: 8px; flex-wrap: wrap; }
  #time-fields .form-row { flex: 1; min-width: 100px; }
  #repeat-options { display: none; gap: 8px; flex-direction: column; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-primary {
    background: var(--primary); color: #fff; border: none;
    padding: 9px 20px; border-radius: 8px; font-size: .9rem; cursor: pointer;
    transition: background .15s; display: inline-flex; align-items: center;
  }
  .btn-primary:hover { background: var(--primary-h); }
  .btn-ghost {
    background: none; border: 1px solid var(--border); color: var(--text);
    padding: 9px 16px; border-radius: 8px; font-size: .9rem; cursor: pointer;
  }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger {
    background: none; border: none; color: #d93025; cursor: pointer;
    font-size: .85rem; margin-right: auto; padding: 4px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .btn-danger:hover { text-decoration: underline; }

  /* Type selector row */
  .type-row { display: flex; align-items: center; gap: 10px; }
  .type-row select { flex: 1; }
  #type-icon-preview { font-size: 1.4rem; }


  /* ══════════════════════════════════════════════════════
     ROOSTER STYLES
  ══════════════════════════════════════════════════════ */
  .grid-rooster { display: flex; flex-direction: column; height: 100%; overflow-y: auto; }

  .rooster-welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; padding: 48px 24px; text-align: center; gap: 12px;
  }
  .rooster-welcome-icon { font-size: 3.5rem; }
  .rooster-welcome h2   { font-size: 1.4rem; font-weight: 600; }
  .rooster-welcome p    { color: var(--muted); line-height: 1.6; max-width: 360px; }

  .rooster-header {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    padding: 12px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .rooster-hdr-left { display: flex; flex-direction: column; gap: 2px; }
  .rooster-title    { font-size: 1rem; font-weight: 700; }
  .rooster-sub      { font-size: .80rem; color: var(--muted); }
  .rooster-hdr-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-sm { padding: 5px 10px !important; font-size: .80rem !important; }
  .btn-danger-sm { color: #d93025 !important; border-color: #f5c6c2 !important; }

  .rooster-legend {
    display: flex; gap: 16px; padding: 8px 20px;
    background: var(--bg); border-bottom: 1px solid var(--border);
    flex-wrap: wrap; flex-shrink: 0;
  }
  .rleg-item { display: flex; align-items: center; gap: 6px; font-size: .82rem; color: var(--muted); }
  .rleg-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .rleg-swap { background: repeating-linear-gradient(45deg,#aaa,#aaa 2px,#fff 2px,#fff 5px); border: 1px solid #aaa; }

  .rooster-list { padding: 8px 16px 80px; display: flex; flex-direction: column; gap: 3px; }

  .rooster-month-hdr {
    font-size: .78rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .06em;
    padding: 12px 4px 4px;
  }

  .rooster-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    transition: box-shadow .15s;
  }
  .rooster-row:hover { box-shadow: var(--shadow); }
  .rooster-past { opacity: .45; }
  .rooster-swapped { border-style: dashed; }

  .rooster-datum {
    display: flex; flex-direction: column; align-items: center;
    min-width: 38px; flex-shrink: 0;
  }
  .rooster-dag { font-size: .68rem; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  .rooster-dd  { font-size: 1.1rem; font-weight: 700; line-height: 1.1; }
  .rooster-mnd { font-size: .68rem; color: var(--muted); }

  .rooster-wie {
    flex: 1; padding: 4px 10px; border-radius: 6px; min-width: 0;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .rooster-naam      { font-size: .88rem; font-weight: 600; }
  .rooster-swap-badge {
    font-size: .72rem; background: #fff3e0; color: #e65100;
    border: 1px solid #ffe0b2; border-radius: 10px; padding: 1px 6px;
  }
  .rooster-notitie { font-size: .78rem; color: var(--muted); font-style: italic; }

  .rooster-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .rooster-btn-swap, .rooster-btn-note {
    border: 1px solid var(--border); background: var(--bg);
    border-radius: 6px; padding: 4px 8px; cursor: pointer;
    font-size: .82rem; transition: background .1s;
  }
  .rooster-btn-swap:hover { background: #fff3e0; border-color: #ffb74d; }
  .rooster-btn-note:hover { background: #e8f0fe; border-color: #90b4f5; }

  /* ── Rooster wizard overlay ────────────────── */
  #rooster-wizard-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); z-index: 200;
    align-items: center; justify-content: center; padding: 16px;
  }
  #rooster-wizard {
    background: var(--surface); border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
    width: 100%; max-width: 420px; padding: 24px;
    display: flex; flex-direction: column; gap: 14px;
    animation: popIn .18s ease; max-height: 90dvh; overflow-y: auto;
  }
  .rw-title { font-size: 1.1rem; font-weight: 700; }
  .rw-patroon-row { display: flex; align-items: center; gap: 8px; }
  .rw-patroon-row input { width: 60px; text-align: center; }
  .rw-patroon-sep { font-size: 1rem; color: var(--muted); font-weight: 600; }

  /* ── Export overlay ─────────────────────────── */
  #export-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); z-index: 200;
    align-items: center; justify-content: center; padding: 16px;
  }
  #export-modal {
    background: var(--surface); border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
    width: 100%; max-width: 460px; padding: 24px;
    display: flex; flex-direction: column; gap: 14px;
    animation: popIn .18s ease; max-height: 90dvh; overflow-y: auto;
  }
  .export-title { font-size: 1.1rem; font-weight: 700; }
  .export-sub   { font-size: .88rem; color: var(--muted); }
  #export-tekst {
    width: 100%; min-height: 160px; font-size: .80rem;
    font-family: monospace; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; resize: vertical;
    color: var(--text); background: var(--bg);
  }
  .export-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

  /* ── Toast ──────────────────────────────────── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #323232; color: #fff; border-radius: 8px;
    padding: 10px 20px; font-size: .88rem; z-index: 500;
    opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast-ok    { background: #1e7e34; }
  .toast-warn  { background: #e65100; }
  .toast-error { background: #b71c1c; }
  .toast-info  { background: #0d47a1; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <h1>📅 Agenda</h1>
  <p style="color:var(--muted)">Inloggen om je agenda te openen</p>
  <button id="btn-login">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Inloggen met Google
  </button>
</div>

<!-- App -->
<div id="app-shell" style="flex-direction:column">

  <!-- Topbar -->
  <div id="topbar">
    <div id="topbar-row1">
      <button id="btn-menu" title="Menu">☰</button>
      <h2>📅</h2>
      <button id="btn-today">Vandaag</button>
      <button id="btn-prev">&#8249;</button>
      <button id="btn-next">&#8250;</button>
      <span id="view-title"></span>
      <img id="user-avatar" src="" alt="avatar">
      <span id="user-name"></span>
      <button id="btn-logout">Uitloggen</button>
    </div>
    <div id="topbar-row2">
      <button class="view-btn active" data-view="month">Maand</button>
      <button class="view-btn" data-view="week">Week</button>
      <button class="view-btn" data-view="day">Dag</button>
      <button class="view-btn" data-view="list">Lijst</button>
      <button class="view-btn" data-view="rooster">🏃 Rooster</button>
    </div>
  </div>

  <div id="sidebar-backdrop"></div>
  <div id="main-layout" style="flex:1;overflow:hidden">

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-label">Mijn agenda's</div>
      <div id="cal-list"></div>
      <button id="btn-new-cal">+ Agenda toevoegen</button>

      <div class="sidebar-label" style="margin-top:12px">Soorten</div>
      <div id="type-legend"></div>

      <div class="sidebar-label" style="margin-top:12px">Google Agenda</div>
      <button id="btn-gcal-sync">📆 Synchroniseren</button>
      <div id="gcal-status"></div>
    </div>

    <!-- Cal area -->
    <div id="cal-area">
      <div id="calendar-grid"></div>
    </div>

  </div>
</div>

<!-- FAB -->
<button id="btn-new" title="Nieuwe afspraak">＋</button>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-title-text">Nieuwe afspraak</div>

    <div class="form-row">
      <label>Titel</label>
      <input id="ev-title" type="text" placeholder="Afspraak toevoegen">
    </div>

    <div class="form-row">
      <label>Soort</label>
      <div class="type-row">
        <select id="ev-type">
          <option value="afspraak">📅 Afspraak</option>
          <option value="verjaardag">🎂 Verjaardag</option>
          <option value="vakantie">🏖️ Vakantie</option>
          <option value="bijzonder">⭐ Bijzondere dag</option>
          <option value="sterfdag">🕯️ Sterfdag</option>
          <option value="training">🏃 Training</option>
        </select>
        <span id="type-icon-preview">📅</span>
      </div>
    </div>

    <div class="form-inline">
      <input id="ev-allday" type="checkbox">
      <label for="ev-allday">Hele dag</label>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div class="form-row" style="flex:1;min-width:120px">
        <label>Startdatum</label>
        <input id="ev-start-date" type="date">
      </div>
      <div class="form-row" style="flex:1;min-width:120px">
        <label>Einddatum</label>
        <input id="ev-end-date" type="date">
      </div>
    </div>

    <div id="time-fields">
      <div class="form-row">
        <label>Starttijd</label>
        <input id="ev-start-time" type="time">
      </div>
      <div class="form-row">
        <label>Eindtijd</label>
        <input id="ev-end-time" type="time">
      </div>
    </div>

    <div class="form-row">
      <label>Agenda</label>
      <select id="ev-calendar"></select>
    </div>

    <div class="form-row">
      <label>Herhaling</label>
      <select id="ev-repeat">
        <option value="none">Niet herhalen</option>
        <option value="daily">Dagelijks</option>
        <option value="weekly">Wekelijks</option>
        <option value="monthly">Maandelijks</option>
        <option value="yearly">Jaarlijks</option>
      </select>
    </div>

    <div id="repeat-options">
      <div class="form-row">
        <label>Herhalen tot</label>
        <input id="ev-repeat-end" type="date">
      </div>
    </div>

    <div class="form-row">
      <label>Beschrijving / notitie</label>
      <textarea id="ev-desc" placeholder="Optioneel..."></textarea>
    </div>

    <div class="modal-actions">
      <button id="btn-modal-delete" class="btn-danger">🗑 Verwijderen</button>
      <button id="btn-modal-cancel" class="btn-ghost">Annuleren</button>
      <button id="btn-modal-save" class="btn-primary">Opslaan</button>
    </div>
  </div>
</div>


<!-- Rooster Wizard -->
<div id="rooster-wizard-overlay">
  <div id="rooster-wizard">
    <div class="rw-title">🏃 Trainingsrooster instellen</div>

    <div class="form-row">
      <label>Jaar</label>
      <input id="rw-jaar" type="number" min="2024" max="2035" value="2025">
    </div>

    <div class="form-row">
      <label>Jouw naam</label>
      <input id="rw-naam1" type="text" placeholder="Bijv. Dave">
    </div>

    <div class="form-row">
      <label>Naam trainingspartner</label>
      <input id="rw-naam2" type="text" placeholder="Bijv. Jan">
    </div>

    <div class="form-row">
      <label>Basispatroon (weken aan / weken af)</label>
      <div class="rw-patroon-row">
        <input id="rw-patroon1" type="number" min="1" max="8" value="2">
        <span class="rw-patroon-sep">weken jij, dan</span>
        <input id="rw-patroon2" type="number" min="1" max="8" value="2">
        <span class="rw-patroon-sep">weken partner</span>
      </div>
    </div>

    <div class="form-row">
      <label>Eerste trainingszondag</label>
      <input id="rw-startdate" type="date">
    </div>

    <div class="modal-actions">
      <button id="btn-rw-cancel" class="btn-ghost">Annuleren</button>
      <button id="btn-rw-save" class="btn-primary">Rooster genereren</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div id="export-overlay">
  <div id="export-modal">
    <div class="export-title">📤 Rooster exporteren</div>
    <div class="export-sub">Exporteer voor: <strong id="export-preview-naam"></strong> (<span id="export-count"></span> zondagen)</div>

    <div class="form-row">
      <label>Exporteer voor</label>
