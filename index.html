<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
    onSnapshot, query, where, orderBy, Timestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ─────────────────────────────────────────────
  // 🔧 JOUW FIREBASE CONFIG — vul dit in!
  // ─────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyCarNYs1YHRp0tgziw1KbiqbhLONpBqSCU",
    authDomain:        "agenda-29969.firebaseapp.com",
    projectId:         "agenda-29969",
    storageBucket:     "agenda-29969.firebasestorage.app",
    messagingSenderId: "360948766209",
    appId:             "1:360948766209:web:db4b6126cd5177f85f5200",
    measurementId:     "G-3WF8P0ZNN9"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── State ──────────────────────────────────
  let currentUser  = null;
  let events       = [];          // alle geladen events
  let calendars    = [];          // agenda's van user
  let today        = new Date();
  let viewDate     = new Date();  // "anker" datum voor huidige weergave
  let currentView  = "month";     // month | week | day | list
  let unsubEvents  = null;
  let unsubCals    = null;
  let editingEvent = null;        // null = nieuw, anders event-object

  const WEEKDAYS_SHORT = ["zo","ma","di","wo","do","vr","za"];
  const WEEKDAYS_LONG  = ["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"];
  const MONTHS         = ["Januari","Februari","Maart","April","Mei","Juni",
                           "Juli","Augustus","September","Oktober","November","December"];

  // ── DOM helpers ────────────────────────────
  const $  = id => document.getElementById(id);
  const el = (tag, cls, html) => {
    const e = document.createElement(tag);
    if (cls)  e.className = cls;
    if (html) e.innerHTML = html;
    return e;
  };

  // ── Auth ───────────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    $("btn-login").addEventListener("click", () => {
      signInWithPopup(auth, new GoogleAuthProvider()).catch(console.error);
    });
    $("btn-logout").addEventListener("click", () => signOut(auth));

    onAuthStateChanged(auth, user => {
      currentUser = user;
      if (user) {
        $("login-screen").style.display  = "none";
        $("app-shell").style.display     = "flex";
        $("user-avatar").src             = user.photoURL || "";
        $("user-name").textContent       = user.displayName || user.email;
        subscribeData();
        renderAll();
      } else {
        $("login-screen").style.display  = "flex";
        $("app-shell").style.display     = "none";
        if (unsubEvents) { unsubEvents(); unsubEvents = null; }
        if (unsubCals)   { unsubCals();   unsubCals   = null; }
        events = []; calendars = [];
      }
    });

    // nav buttons
    $("btn-prev").addEventListener("click", () => navigate(-1));
    $("btn-next").addEventListener("click", () => navigate(+1));
    $("btn-today").addEventListener("click", () => { viewDate = new Date(); renderAll(); });

    // view switcher
    document.querySelectorAll(".view-btn").forEach(b =>
      b.addEventListener("click", () => {
        currentView = b.dataset.view;
        document.querySelectorAll(".view-btn").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        renderAll();
      })
    );

    // new event FAB
    $("btn-new").addEventListener("click", () => openModal(null));

    // modal close
    $("modal-overlay").addEventListener("click", e => {
      if (e.target === $("modal-overlay")) closeModal();
    });
    $("btn-modal-cancel").addEventListener("click", closeModal);
    $("btn-modal-save").addEventListener("click", saveEvent);
    $("btn-modal-delete").addEventListener("click", deleteEvent);

    // calendar sidebar new
    $("btn-new-cal").addEventListener("click", () => {
      const name = prompt("Naam nieuwe agenda:");
      if (name) createCalendar(name);
    });

    // all-day toggle in modal
    $("ev-allday").addEventListener("change", () => {
      const hide = $("ev-allday").checked;
      $("time-fields").style.display = hide ? "none" : "flex";
    });

    // repeat rule toggle
    $("ev-repeat").addEventListener("change", toggleRepeatOptions);
  });

  // ── Firestore subscriptions ────────────────
  function subscribeData() {
    const uid = currentUser.uid;

    // calendars
    if (unsubCals) unsubCals();
    const calQ = query(collection(db, "calendars"), where("members", "array-contains", uid));
    unsubCals = onSnapshot(calQ, snap => {
      calendars = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (calendars.length === 0) createCalendar("Persoonlijk");
      renderSidebar();
      renderAll();
    });

    // events
    if (unsubEvents) unsubEvents();
    const evQ = query(collection(db, "events"), where("members", "array-contains", uid));
    unsubEvents = onSnapshot(evQ, snap => {
      events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    });
  }

  async function createCalendar(name) {
    const colors = ["#4285f4","#0f9d58","#db4437","#f4b400","#ab47bc","#00acc1","#ff7043"];
    const color  = colors[Math.floor(Math.random() * colors.length)];
    await addDoc(collection(db, "calendars"), {
      name, color,
      members: [currentUser.uid],
      owner:   currentUser.uid,
      createdAt: Timestamp.now()
    });
  }

  // ── Render orchestrator ────────────────────
  function renderAll() {
    renderHeader();
    if      (currentView === "month") renderMonth();
    else if (currentView === "week")  renderWeek();
    else if (currentView === "day")   renderDay();
    else if (currentView === "list")  renderList();
  }

  function renderHeader() {
    let label = "";
    if (currentView === "month")
      label = `${MONTHS[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
    else if (currentView === "week") {
      const mon = startOfWeek(viewDate);
      const sun = new Date(mon); sun.setDate(sun.getDate() + 6);
      label = `${mon.getDate()} ${MONTHS[mon.getMonth()].slice(0,3)} – ${sun.getDate()} ${MONTHS[sun.getMonth()].slice(0,3)} ${sun.getFullYear()}`;
    } else if (currentView === "day")
      label = `${WEEKDAYS_LONG[viewDate.getDay()]} ${viewDate.getDate()} ${MONTHS[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
    else label = "Aankomende afspraken";
    $("view-title").textContent = label;
  }

  // ── MONTH VIEW ─────────────────────────────
  function renderMonth() {
    const grid = $("calendar-grid");
    grid.innerHTML = "";
    grid.className = "grid-month";

    const year = viewDate.getFullYear(), month = viewDate.getMonth();
    const first = new Date(year, month, 1);
    const startDay = (first.getDay() + 6) % 7; // monday-based

    // header row
    ["Ma","Di","Wo","Do","Vr","Za","Zo"].forEach(d => {
      const h = el("div", "grid-header", d);
      grid.appendChild(h);
    });

    // blank cells before month start
    for (let i = 0; i < startDay; i++) grid.appendChild(el("div", "day-cell other-month"));

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const dateObj = new Date(year, month, d);
      const cell = el("div", "day-cell");
      if (isSameDay(dateObj, today)) cell.classList.add("today");

      const num = el("div", "day-number", String(d));
      cell.appendChild(num);

      // events
      const dayEvs = getEventsForDay(dateObj);
      dayEvs.slice(0, 3).forEach(ev => {
        const cal = getCalendar(ev.calendarId);
        const dot = el("div", "ev-pill", `<span>${ev.title}</span>`);
        dot.style.background = cal?.color || "#4285f4";
        dot.addEventListener("click", e => { e.stopPropagation(); openModal(ev); });
        cell.appendChild(dot);
      });
      if (dayEvs.length > 3) {
        cell.appendChild(el("div", "ev-more", `+${dayEvs.length - 3} meer`));
      }

      cell.addEventListener("click", () => {
        viewDate = dateObj; currentView = "day";
        document.querySelectorAll(".view-btn").forEach(x => x.classList.remove("active"));
        document.querySelector('[data-view="day"]').classList.add("active");
        renderAll();
      });
      grid.appendChild(cell);
    }
  }

  // ── WEEK VIEW ──────────────────────────────
  function renderWeek() {
    const grid = $("calendar-grid");
    grid.innerHTML = "";
    grid.className = "grid-week";

    const mon = startOfWeek(viewDate);

    // time gutter + 7 day columns
    const headerRow = el("div", "week-header-row");
    headerRow.appendChild(el("div", "time-gutter", "")); // empty corner

    const cols = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(mon); d.setDate(d.getDate() + i);
      const isToday = isSameDay(d, today);
      const hd = el("div", `week-day-header${isToday ? " today" : ""}`,
        `<div class="wdh-name">${WEEKDAYS_SHORT[d.getDay()]}</div><div class="wdh-num">${d.getDate()}</div>`);
      hd.addEventListener("click", () => {
        viewDate = d; currentView = "day";
        document.querySelectorAll(".view-btn").forEach(x => x.classList.remove("active"));
        document.querySelector('[data-view="day"]').classList.add("active");
        renderAll();
      });
      headerRow.appendChild(hd);
      cols.push(d);
    }
    grid.appendChild(headerRow);

    // scrollable body
    const body = el("div", "week-body");
    const timeCol = el("div", "time-col");
    for (let h = 0; h < 24; h++) {
      timeCol.appendChild(el("div", "time-label", `${String(h).padStart(2,"0")}:00`));
    }
    body.appendChild(timeCol);

    cols.forEach(d => {
      const dc = el("div", "week-day-col");
      dc.dataset.date = d.toISOString();
      // hour slots
      for (let h = 0; h < 24; h++) {
        const slot = el("div", "hour-slot");
        slot.dataset.hour = h;
        slot.addEventListener("click", () => {
          const dt = new Date(d); dt.setHours(h, 0);
          openModal(null, dt);
        });
        dc.appendChild(slot);
      }
      // place events
      getEventsForDay(d).forEach(ev => placeEventInWeekCol(dc, ev, d));
      body.appendChild(dc);
    });

    grid.appendChild(body);
    // scroll to 8:00
    setTimeout(() => { body.scrollTop = 8 * 48; }, 50);
  }

  function placeEventInWeekCol(col, ev, date) {
    if (ev.allDay) return; // handled separately
    const start = ev.startTime ? parseTime(ev.startTime) : 0;
    const end   = ev.endTime   ? parseTime(ev.endTime)   : start + 60;
    const top   = (start / 60) * 48;
    const height= Math.max(((end - start) / 60) * 48, 20);
    const cal   = getCalendar(ev.calendarId);
    const pill  = el("div", "week-ev-pill", `<span>${ev.title}</span>`);
    pill.style.top    = top + "px";
    pill.style.height = height + "px";
    pill.style.background = cal?.color || "#4285f4";
    pill.addEventListener("click", e => { e.stopPropagation(); openModal(ev); });
    col.appendChild(pill);
  }

  // ── DAY VIEW ───────────────────────────────
  function renderDay() {
    const grid = $("calendar-grid");
    grid.innerHTML = "";
    grid.className = "grid-day";

    const body = el("div", "day-body");
    const timeCol = el("div", "time-col");
    for (let h = 0; h < 24; h++)
      timeCol.appendChild(el("div", "time-label", `${String(h).padStart(2,"0")}:00`));
    body.appendChild(timeCol);

    const dc = el("div", "day-col");
    for (let h = 0; h < 24; h++) {
      const slot = el("div", "hour-slot");
      slot.dataset.hour = h;
      slot.addEventListener("click", () => {
        const dt = new Date(viewDate); dt.setHours(h, 0);
        openModal(null, dt);
      });
      dc.appendChild(slot);
    }
    getEventsForDay(viewDate).forEach(ev => placeEventInWeekCol(dc, ev, viewDate));
    body.appendChild(dc);
    grid.appendChild(body);
    setTimeout(() => { body.scrollTop = 8 * 48; }, 50);
  }

  // ── LIST VIEW ──────────────────────────────
  function renderList() {
    const grid = $("calendar-grid");
    grid.innerHTML = "";
    grid.className = "grid-list";

    const now = new Date(); now.setHours(0,0,0,0);
    const sorted = events
      .filter(ev => {
        const d = toDate(ev.startDate || ev.date);
        return d >= now;
      })
      .sort((a,b) => toDate(a.startDate||a.date) - toDate(b.startDate||b.date));

    if (sorted.length === 0) {
      grid.appendChild(el("div", "list-empty", "Geen aankomende afspraken."));
      return;
    }

    let lastLabel = "";
    sorted.forEach(ev => {
      const d    = toDate(ev.startDate || ev.date);
      const lbl  = `${WEEKDAYS_LONG[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
      if (lbl !== lastLabel) {
        grid.appendChild(el("div", "list-date-header", lbl));
        lastLabel = lbl;
      }
      const cal  = getCalendar(ev.calendarId);
      const row  = el("div", "list-ev-row");
      row.innerHTML = `
        <span class="list-dot" style="background:${cal?.color||"#4285f4"}"></span>
        <span class="list-time">${ev.allDay ? "Hele dag" : (ev.startTime||"")}</span>
        <span class="list-title">${ev.title}</span>
      `;
      row.addEventListener("click", () => openModal(ev));
      grid.appendChild(row);
    });
  }

  // ── SIDEBAR ────────────────────────────────
  function renderSidebar() {
    const list = $("cal-list");
    list.innerHTML = "";
    calendars.forEach(cal => {
      const item = el("div", "cal-item");
      item.innerHTML = `
        <span class="cal-dot" style="background:${cal.color}"></span>
        <span class="cal-name">${cal.name}</span>
      `;
      list.appendChild(item);
    });
  }

  // ── MODAL ──────────────────────────────────
  function openModal(ev, prefillDate) {
    editingEvent = ev;
    const modal = $("modal-overlay");
    modal.style.display = "flex";

    // fill calendar dropdown
    const sel = $("ev-calendar");
    sel.innerHTML = "";
    calendars.forEach(cal => {
      const o = document.createElement("option");
      o.value = cal.id; o.textContent = cal.name;
      if (ev && ev.calendarId === cal.id) o.selected = true;
      sel.appendChild(o);
    });

    if (ev) {
      $("modal-title-text").textContent = "Afspraak bewerken";
      $("btn-modal-delete").style.display = "inline-flex";
      $("ev-title").value    = ev.title || "";
      $("ev-allday").checked = !!ev.allDay;
      $("ev-start-date").value = ev.startDate || ev.date || "";
      $("ev-end-date").value   = ev.endDate   || ev.date || "";
      $("ev-start-time").value = ev.startTime || "09:00";
      $("ev-end-time").value   = ev.endTime   || "10:00";
      $("ev-desc").value       = ev.description || "";
      $("ev-repeat").value     = ev.repeat || "none";
      $("time-fields").style.display = ev.allDay ? "none" : "flex";
    } else {
      $("modal-title-text").textContent = "Nieuwe afspraak";
      $("btn-modal-delete").style.display = "none";
      const base = prefillDate || new Date();
      $("ev-title").value    = "";
      $("ev-allday").checked = false;
      $("ev-start-date").value = toISO(base);
      $("ev-end-date").value   = toISO(base);
      $("ev-start-time").value = `${String(base.getHours()).padStart(2,"0")}:00`;
      $("ev-end-time").value   = `${String(base.getHours()+1).padStart(2,"0")}:00`;
      $("ev-desc").value       = "";
      $("ev-repeat").value     = "none";
      $("time-fields").style.display = "flex";
    }
    toggleRepeatOptions();
    $("ev-title").focus();
  }

  function closeModal() {
    $("modal-overlay").style.display = "none";
    editingEvent = null;
  }

  function toggleRepeatOptions() {
    $("repeat-options").style.display =
      $("ev-repeat").value !== "none" ? "flex" : "none";
  }

  async function saveEvent() {
    const title = $("ev-title").value.trim();
    if (!title) { $("ev-title").focus(); return; }

    const data = {
      title,
      allDay:      $("ev-allday").checked,
      startDate:   $("ev-start-date").value,
      endDate:     $("ev-end-date").value,
      startTime:   $("ev-start-time").value,
      endTime:     $("ev-end-time").value,
      description: $("ev-desc").value.trim(),
      calendarId:  $("ev-calendar").value,
      repeat:      $("ev-repeat").value,
      repeatEnd:   $("ev-repeat-end").value || null,
      members:     [currentUser.uid],
      updatedAt:   Timestamp.now()
    };

    if (editingEvent) {
      await updateDoc(doc(db, "events", editingEvent.id), data);
    } else {
      data.createdAt = Timestamp.now();
      data.createdBy = currentUser.uid;
      await addDoc(collection(db, "events"), data);
    }
    closeModal();
  }

  async function deleteEvent() {
    if (!editingEvent) return;
    if (!confirm(`"${editingEvent.title}" verwijderen?`)) return;
    await deleteDoc(doc(db, "events", editingEvent.id));
    closeModal();
  }

  // ── Navigation ─────────────────────────────
  function navigate(dir) {
    const d = new Date(viewDate);
    if (currentView === "month")     d.setMonth(d.getMonth() + dir);
    else if (currentView === "week") d.setDate(d.getDate() + dir * 7);
    else if (currentView === "day")  d.setDate(d.getDate() + dir);
    else                             d.setDate(d.getDate() + dir * 14);
    viewDate = d;
    renderAll();
  }

  // ── Helpers ────────────────────────────────
  function isSameDay(a, b) {
    return a.getFullYear() === b.getFullYear() &&
           a.getMonth()    === b.getMonth()    &&
           a.getDate()     === b.getDate();
  }

  function toDate(str) {
    if (!str) return new Date(0);
    if (str.toDate) return str.toDate(); // Firestore Timestamp
    return new Date(str + "T00:00:00");
  }

  function toISO(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  function parseTime(t) {
    const [h,m] = t.split(":").map(Number);
    return h * 60 + (m||0);
  }

  function startOfWeek(d) {
    const r = new Date(d);
    const day = (r.getDay() + 6) % 7; // monday=0
    r.setDate(r.getDate() - day);
    r.setHours(0,0,0,0);
    return r;
  }

  function getCalendar(id) {
    return calendars.find(c => c.id === id) || null;
  }

  function getEventsForDay(date) {
    return events.filter(ev => {
      const start = toDate(ev.startDate || ev.date);
      const end   = toDate(ev.endDate   || ev.startDate || ev.date);

      // normalize to midnight
      const s = new Date(start); s.setHours(0,0,0,0);
      const e = new Date(end);   e.setHours(0,0,0,0);
      const t = new Date(date);  t.setHours(0,0,0,0);

      if (ev.repeat === "none" || !ev.repeat) return s <= t && t <= e;

      // simple repeat expansion
      return matchesRepeat(ev, date);
    }).sort((a,b) => (a.startTime||"00:00").localeCompare(b.startTime||"00:00"));
  }

  function matchesRepeat(ev, date) {
    const origin = toDate(ev.startDate || ev.date);
    origin.setHours(0,0,0,0);
    const t = new Date(date); t.setHours(0,0,0,0);
    if (t < origin) return false;
    if (ev.repeatEnd) {
      const re = toDate(ev.repeatEnd); re.setHours(0,0,0,0);
      if (t > re) return false;
    }
    const diff = Math.round((t - origin) / 86400000);
    if (ev.repeat === "daily")   return diff % 1 === 0;
    if (ev.repeat === "weekly")  return diff % 7 === 0;
    if (ev.repeat === "monthly") return origin.getDate() === t.getDate();
    if (ev.repeat === "yearly")  return origin.getDate() === t.getDate() && origin.getMonth() === t.getMonth();
    return false;
  }
</script>

<style>
  /* ── Reset & base ─────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #f8f9fa;
    --surface:   #ffffff;
    --border:    #e0e0e0;
    --text:      #202124;
    --muted:     #70757a;
    --primary:   #1a73e8;
    --primary-h: #1558b0;
    --today-bg:  #1a73e8;
    --today-fg:  #ffffff;
    --radius:    10px;
    --shadow:    0 2px 12px rgba(0,0,0,.10);
    --font:      'Google Sans', 'Segoe UI', Arial, sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text);
         height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

  /* ── Login screen ─────────────────────────── */
  #login-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    z-index: 100;
  }
  #login-screen h1 { font-size: 2rem; color: var(--primary); letter-spacing: -1px; }
  #btn-login {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 24px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); font-size: 1rem; cursor: pointer;
    box-shadow: var(--shadow); transition: box-shadow .2s;
  }
  #btn-login:hover { box-shadow: 0 4px 18px rgba(0,0,0,.15); }
  #btn-login img { width: 22px; height: 22px; }

  /* ── App shell ────────────────────────────── */
  #app-shell { display: none; flex: 1; overflow: hidden; }

  /* ── Top bar ──────────────────────────────── */
  #topbar {
    height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 16px;
    flex-shrink: 0;
  }
  #topbar h2 { font-size: 1.3rem; color: var(--primary); font-weight: 500; margin-right: 8px; }
  #btn-today, #btn-prev, #btn-next {
    border: none; background: none; cursor: pointer; padding: 6px 10px;
    border-radius: 6px; font-size: .9rem; color: var(--text);
    transition: background .15s;
  }
  #btn-today { border: 1px solid var(--border); margin-right: 4px; }
  #btn-prev:hover, #btn-next:hover, #btn-today:hover { background: var(--bg); }
  #view-title { flex: 1; font-size: 1.1rem; font-weight: 500; color: var(--text); }
  .view-btn {
    border: none; background: none; cursor: pointer; padding: 6px 14px;
    border-radius: 20px; font-size: .85rem; color: var(--muted); transition: all .15s;
  }
  .view-btn.active { background: #e8f0fe; color: var(--primary); font-weight: 600; }
  #user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; margin-left: 8px; }
  #user-name { font-size: .85rem; color: var(--muted); display: none; }
  @media(min-width:600px) { #user-name { display: inline; } }
  #btn-logout {
    border: none; background: none; cursor: pointer; font-size: .8rem; color: var(--muted);
    padding: 4px 8px; border-radius: 4px;
  }
  #btn-logout:hover { color: var(--text); background: var(--bg); }

  /* ── Main layout ──────────────────────────── */
  #main-layout {
    display: flex; flex: 1; overflow: hidden;
  }
  #sidebar {
    width: 220px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 16px 8px; gap: 4px;
    overflow-y: auto;
  }
  @media(max-width:640px) { #sidebar { display: none; } }
  .sidebar-label { font-size: .75rem; font-weight: 600; color: var(--muted);
                   text-transform: uppercase; letter-spacing: .05em; padding: 6px 8px; }
  #cal-list { display: flex; flex-direction: column; gap: 2px; }
  .cal-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px;
              border-radius: 6px; cursor: pointer; font-size: .9rem; }
  .cal-item:hover { background: var(--bg); }
  .cal-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  #btn-new-cal { margin-top: 8px; border: none; background: none; cursor: pointer;
                 font-size: .85rem; color: var(--primary); padding: 4px 8px;
                 text-align: left; border-radius: 6px; }
  #btn-new-cal:hover { background: #e8f0fe; }

  /* ── Calendar area ────────────────────────── */
  #cal-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  #calendar-grid { flex: 1; overflow-y: auto; }

  /* ── FAB ──────────────────────────────────── */
  #btn-new {
    position: fixed; bottom: 24px; right: 24px;
    width: 56px; height: 56px; border-radius: 16px;
    background: var(--primary); color: #fff;
    border: none; font-size: 28px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(26,115,232,.4); transition: transform .15s, box-shadow .15s;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }
  #btn-new:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(26,115,232,.5); }

  /* ── MONTH GRID ───────────────────────────── */
  .grid-month {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  .grid-header {
    padding: 8px; font-size: .75rem; font-weight: 600; color: var(--muted);
    text-align: center; text-transform: uppercase; letter-spacing: .05em;
    background: var(--surface);
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .day-cell {
    min-height: 100px; padding: 4px; vertical-align: top;
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    background: var(--surface); cursor: pointer;
    transition: background .1s;
  }
  .day-cell:hover { background: #f1f3f4; }
  .day-cell.other-month { background: #fafafa; }
  .day-cell.today .day-number {
    background: var(--today-bg); color: var(--today-fg);
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
  }
  .day-number { font-size: .85rem; font-weight: 500; padding: 2px; margin-bottom: 2px;
                display: inline-flex; align-items: center; justify-content: center;
                min-width: 26px; min-height: 26px; }
  .ev-pill {
    display: flex; align-items: center; gap: 4px;
    background: var(--primary); color: #fff; border-radius: 4px;
    padding: 1px 6px; font-size: .78rem; margin-bottom: 2px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: filter .1s;
  }
  .ev-pill:hover { filter: brightness(1.15); }
  .ev-more { font-size: .75rem; color: var(--muted); padding-left: 4px; }

  /* ── WEEK / DAY GRID ──────────────────────── */
  .grid-week, .grid-day { display: flex; flex-direction: column; height: 100%; }
  .week-header-row {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .time-gutter { width: 52px; flex-shrink: 0; }
  .week-day-header {
    flex: 1; text-align: center; padding: 8px 4px; cursor: pointer;
    font-size: .82rem; color: var(--muted); border-left: 1px solid var(--border);
    transition: background .1s;
  }
  .week-day-header:hover { background: #f1f3f4; }
  .week-day-header.today { color: var(--primary); }
  .week-day-header.today .wdh-num {
    background: var(--today-bg); color: #fff;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; margin: 0 auto;
    font-weight: 700;
  }
  .wdh-name { font-size: .72rem; text-transform: uppercase; font-weight: 600; }
  .wdh-num  { font-size: 1.1rem; font-weight: 400; line-height: 1; margin-top: 2px; }

  .week-body, .day-body {
    display: flex; flex: 1; overflow-y: auto; position: relative;
  }
  .time-col {
    width: 52px; flex-shrink: 0;
    display: flex; flex-direction: column;
  }
  .time-label {
    height: 48px; font-size: .72rem; color: var(--muted);
    text-align: right; padding-right: 6px;
    display: flex; align-items: flex-start; padding-top: 2px;
  }
  .week-day-col, .day-col {
    flex: 1; position: relative; border-left: 1px solid var(--border);
    min-width: 0;
  }
  .hour-slot {
    height: 48px; border-bottom: 1px solid #f0f0f0;
    cursor: pointer; transition: background .1s;
  }
  .hour-slot:hover { background: #f1f3f4; }
  .week-ev-pill {
    position: absolute; left: 2px; right: 2px;
    background: var(--primary); color: #fff;
    border-radius: 4px; padding: 2px 4px;
    font-size: .75rem; overflow: hidden; cursor: pointer;
    z-index: 2; transition: filter .1s;
  }
  .week-ev-pill:hover { filter: brightness(1.15); }

  /* ── LIST VIEW ────────────────────────────── */
  .grid-list { padding: 16px 24px; display: flex; flex-direction: column; gap: 2px; }
  .list-date-header {
    font-size: .85rem; font-weight: 600; color: var(--muted);
    padding: 12px 0 4px; text-transform: uppercase; letter-spacing: .04em;
  }
  .list-ev-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-radius: 8px; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border);
    margin-bottom: 4px; transition: box-shadow .15s;
  }
  .list-ev-row:hover { box-shadow: var(--shadow); }
  .list-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .list-time { font-size: .82rem; color: var(--muted); min-width: 60px; }
  .list-title { font-size: .92rem; }
  .list-empty { padding: 48px; text-align: center; color: var(--muted); font-size: .95rem; }

  /* ── MODAL ────────────────────────────────── */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); z-index: 200;
    align-items: center; justify-content: center; padding: 16px;
  }
  #modal {
    background: var(--surface); border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
    width: 100%; max-width: 480px; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
    animation: popIn .18s ease;
  }
  @keyframes popIn { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #modal-title-text { font-size: 1.1rem; font-weight: 600; }
  .form-row { display: flex; flex-direction: column; gap: 4px; }
  .form-row label { font-size: .8rem; color: var(--muted); }
  .form-row input, .form-row textarea, .form-row select {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-size: .92rem; font-family: var(--font);
    outline: none; transition: border-color .15s;
  }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
    border-color: var(--primary);
  }
  .form-row textarea { resize: vertical; min-height: 60px; }
  .form-inline { display: flex; align-items: center; gap: 8px; font-size: .9rem; }
  #time-fields { display: flex; gap: 8px; flex-wrap: wrap; }
  #time-fields .form-row { flex: 1; min-width: 100px; }
  #repeat-options { display: none; gap: 8px; flex-direction: column; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-primary {
    background: var(--primary); color: #fff; border: none;
    padding: 9px 20px; border-radius: 8px; font-size: .9rem; cursor: pointer;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--primary-h); }
  .btn-ghost {
    background: none; border: 1px solid var(--border); color: var(--text);
    padding: 9px 16px; border-radius: 8px; font-size: .9rem; cursor: pointer;
  }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger {
    background: none; border: none; color: #d93025; cursor: pointer;
    font-size: .85rem; margin-right: auto; padding: 4px;
  }
  .btn-danger:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen">
  <h1>📅 Agenda</h1>
  <p style="color:var(--muted)">Inloggen om je agenda te openen</p>
  <button id="btn-login">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Inloggen met Google
  </button>
</div>

<!-- App shell -->
<div id="app-shell" style="flex-direction:column">

  <!-- Top bar -->
  <div id="topbar">
    <h2>📅</h2>
    <button id="btn-today">Vandaag</button>
    <button id="btn-prev">&#8249;</button>
    <button id="btn-next">&#8250;</button>
    <span id="view-title"></span>
    <button class="view-btn active" data-view="month">Maand</button>
    <button class="view-btn" data-view="week">Week</button>
    <button class="view-btn" data-view="day">Dag</button>
    <button class="view-btn" data-view="list">Lijst</button>
    <img id="user-avatar" src="" alt="avatar">
    <span id="user-name"></span>
    <button id="btn-logout">Uitloggen</button>
  </div>

  <!-- Main -->
  <div id="main-layout" style="flex:1;overflow:hidden">

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-label">Mijn agenda's</div>
      <div id="cal-list"></div>
      <button id="btn-new-cal">+ Agenda toevoegen</button>
    </div>

    <!-- Calendar area -->
    <div id="cal-area">
      <div id="calendar-grid"></div>
    </div>

  </div>
</div>

<!-- FAB -->
<button id="btn-new" title="Nieuwe afspraak">＋</button>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-title-text">Nieuwe afspraak</div>

    <div class="form-row">
      <label>Titel</label>
      <input id="ev-title" type="text" placeholder="Afspraak toevoegen">
    </div>

    <div class="form-inline">
      <input id="ev-allday" type="checkbox">
      <label for="ev-allday">Hele dag</label>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div class="form-row" style="flex:1;min-width:120px">
        <label>Startdatum</label>
        <input id="ev-start-date" type="date">
      </div>
      <div class="form-row" style="flex:1;min-width:120px">
        <label>Einddatum</label>
        <input id="ev-end-date" type="date">
      </div>
    </div>

    <div id="time-fields">
      <div class="form-row">
        <label>Starttijd</label>
        <input id="ev-start-time" type="time">
      </div>
      <div class="form-row">
        <label>Eindtijd</label>
        <input id="ev-end-time" type="time">
      </div>
    </div>

    <div class="form-row">
      <label>Agenda</label>
      <select id="ev-calendar"></select>
    </div>

    <div class="form-row">
      <label>Herhaling</label>
      <select id="ev-repeat">
        <option value="none">Niet herhalen</option>
        <option value="daily">Dagelijks</option>
        <option value="weekly">Wekelijks</option>
        <option value="monthly">Maandelijks</option>
        <option value="yearly">Jaarlijks</option>
      </select>
    </div>

    <div id="repeat-options">
      <div class="form-row">
        <label>Herhalen tot</label>
        <input id="ev-repeat-end" type="date">
      </div>
    </div>

    <div class="form-row">
      <label>Beschrijving / notitie</label>
      <textarea id="ev-desc" placeholder="Optioneel..."></textarea>
    </div>

    <div class="modal-actions">
      <button id="btn-modal-delete" class="btn-danger">🗑 Verwijderen</button>
      <button id="btn-modal-cancel" class="btn-ghost">Annuleren</button>
      <button id="btn-modal-save" class="btn-primary">Opslaan</button>
    </div>
  </div>
</div>

</body>
</html>
